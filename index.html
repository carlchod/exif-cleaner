<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Cleaner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans text-gray-800 p-4 relative">

    <div class="absolute top-4 right-4">
        <select id="langSelect" class="bg-white border border-gray-300 text-gray-700 py-1 px-3 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer">
            <option value="en">🇬🇧 English</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="es">🇪🇸 Español</option>
            <option value="fr">🇫🇷 Français</option>
        </select>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-2xl w-full text-center border border-gray-100 mt-10">
        
        <h1 class="text-3xl font-bold mb-2 text-gray-900" data-i18n="title">EXIF Cleaner Pro</h1>
        <p class="text-sm text-gray-500 mb-6" data-i18n="subtitle">Drag and drop as many images as you want. We analyze them and pack them cleaned into a ZIP. <br><span class="text-green-600 font-medium">100% local in your browser.</span></p>

        <div id="settingsPanel" class="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6 flex flex-col sm:flex-row gap-4 text-left justify-between items-center shadow-inner">
            <div class="w-full sm:w-1/2">
                <label for="formatSelect" class="block text-xs font-semibold text-gray-600 uppercase mb-1" data-i18n="formatLabel">Output Format</label>
                <select id="formatSelect" class="w-full bg-white border border-gray-300 text-gray-700 py-2 px-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors">
                    <option value="original" data-i18n="formatOriginal">Keep Original</option>
                    <option value="image/jpeg" data-i18n="formatJpeg">Convert to JPEG</option>
                    <option value="image/webp" data-i18n="formatWebp">Convert to WebP (for Web)</option>
                    <option value="image/png" data-i18n="formatPng">Convert to PNG</option>
                </select>
            </div>
            
            <div class="w-full sm:w-1/2">
                <div class="flex justify-between mb-1">
                    <label for="qualitySlider" class="text-xs font-semibold text-gray-600 uppercase" data-i18n="qualityLabel">Image Quality</label>
                    <span id="qualityLabel" class="text-xs font-bold text-blue-600">80%</span>
                </div>
                <input id="qualitySlider" type="range" min="10" max="100" value="80" class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-blue-600">
                <p class="text-[10px] text-gray-400 mt-1" data-i18n="qualityHint">PNG ignores this setting.</p>
            </div>
        </div>

        <div class="flex items-center justify-center w-full mb-6">
            <label id="dropzone" for="imageUpload" class="flex flex-col items-center justify-center w-full h-48 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors duration-200">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-12 h-12 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="mb-2 text-sm text-gray-600" id="dropBoxText" data-i18n="dropBoxText"><span class="font-semibold text-blue-600">Choose images</span> or drag them here</p>
                </div>
                <input id="imageUpload" type="file" class="hidden" accept="image/jpeg, image/png, image/webp" multiple />
            </label>
        </div>

        <div id="resultArea" class="hidden text-left bg-gray-50 p-4 rounded-xl border border-gray-200">
            
            <div id="progressContainer" class="mb-4">
                <div class="flex justify-between mb-1 text-xs font-semibold text-gray-600">
                    <span id="progressStatus" data-i18n="progressPrep">Preparing processing...</span>
                    <span id="progressPercentage">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full w-0 transition-all duration-300 ease-out"></div>
                </div>
            </div>

            <h3 class="font-semibold text-gray-700 mb-2 text-sm" data-i18n="resultsTitle">Analysis Results:</h3>
            <ul id="logList" class="text-sm text-gray-600 space-y-2 mb-4 h-32 overflow-y-auto border-b border-gray-200 pb-2">
            </ul>
            
            <button id="downloadBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-md disabled:bg-gray-400 disabled:cursor-not-allowed" disabled data-i18n="btnWaiting">
                Waiting for processing...
            </button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
